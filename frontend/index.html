<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SRE Demo: Personal Agenda</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/js-yaml/4.1.0/js-yaml.min.js"></script>
</head>
<body class="bg-gray-100 min-h-screen">
    <div class="container mx-auto px-4 py-8 max-w-2xl">
        <header class="mb-8 text-center">
            <h1 class="text-4xl font-bold text-blue-600">Personal Agenda</h1>
            <p class="text-gray-600 mt-2">SRE Principles Demo Application</p>
        </header>

        <!-- Calendar Section -->
        <div class="bg-white p-6 rounded-lg shadow-md mb-8">
            <div class="flex justify-between items-center mb-4">
                <button onclick="changeMonth(-1)" class="text-blue-500 font-bold p-2 hover:bg-gray-100 rounded">&lt; Prev</button>
                <h2 id="calendar-month-year" class="text-xl font-bold text-gray-800">Month Year</h2>
                <button onclick="changeMonth(1)" class="text-blue-500 font-bold p-2 hover:bg-gray-100 rounded">Next &gt;</button>
            </div>
            <div class="grid grid-cols-7 gap-1 text-center font-bold text-gray-600 mb-2">
                <div>Su</div><div>Mo</div><div>Tu</div><div>We</div><div>Th</div><div>Fr</div><div>Sa</div>
            </div>
            <div id="calendar-grid" class="grid grid-cols-7 gap-1">
                <!-- Days will be generated here -->
            </div>
            <div id="selected-date-info" class="mt-4 text-center text-blue-600 font-semibold italic">
                Selected: Today
            </div>
        </div>

        <!-- Calendar Section -->
        <div class="bg-white p-6 rounded-lg shadow-md mb-8">
            <div class="flex justify-between items-center mb-4">
                <button onclick="changeMonth(-1)" class="text-blue-500 font-bold p-2 hover:bg-gray-100 rounded">&lt; Prev</button>
                <h2 id="calendar-month-year" class="text-xl font-bold text-gray-800">Month Year</h2>
                <button onclick="changeMonth(1)" class="text-blue-500 font-bold p-2 hover:bg-gray-100 rounded">Next &gt;</button>
            </div>
            <div class="grid grid-cols-7 gap-1 text-center font-bold text-gray-600 mb-2">
                <div>Su</div><div>Mo</div><div>Tu</div><div>We</div><div>Th</div><div>Fr</div><div>Sa</div>
            </div>
            <div id="calendar-grid" class="grid grid-cols-7 gap-1">
                <!-- Days will be generated here -->
            </div>
            <div id="selected-date-info" class="mt-4 text-center text-blue-600 font-semibold italic">
                Selected: Today
            </div>
        </div>

        <!-- Add Event Section -->
        <div class="bg-white p-6 rounded-lg shadow-md mb-8">
            <h2 class="text-xl font-semibold mb-4 text-gray-800">Add New Event</h2>
            <div class="space-y-4">
                <input type="text" id="event-title" placeholder="Event Title" class="w-full p-2 border rounded">
                <textarea id="event-desc" placeholder="Description (optional)" class="w-full p-2 border rounded h-24"></textarea>
                <button onclick="handleAddEvent()" class="w-full bg-green-500 text-white font-bold py-2 rounded hover:bg-green-600 transition duration-200">
                    Add to Agenda
                </button>
            </div>
        </div>

        <!-- Agenda List -->
        <div class="bg-white p-6 rounded-lg shadow-md">
            <h2 class="text-xl font-semibold mb-4 text-gray-800">Your Agenda</h2>
            <div id="event-list" class="space-y-4">
                <p class="text-gray-500 italic">Loading events...</p>
            </div>
        </div>

        <!-- SRE Control Panel (Chaos) -->
        <div class="mt-12 border-t pt-8">
            <h2 class="text-2xl font-bold text-red-600 mb-4 text-center">SRE Chaos Control</h2>
            <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                <button onclick="injectLatency()" class="bg-yellow-500 text-white p-3 rounded font-bold hover:bg-yellow-600">Inject 2s Latency</button>
                <button onclick="injectErrors()" class="bg-red-500 text-white p-3 rounded font-bold hover:bg-red-600">50% Error Rate</button>
                <button onclick="resetChaos()" class="bg-gray-500 text-white p-3 rounded font-bold hover:bg-gray-600">Reset Chaos</button>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
