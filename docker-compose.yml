services:
  # Firestore Emulator
  firestore:
    image: google/cloud-sdk:emulators
    platform: linux/amd64
    ports:
      - "8089:8089"
    command: gcloud beta emulators firestore start --host-port=0.0.0.0:8089

  # Backend API
  backend:
    build: ./backend
    platform: linux/amd64
    ports:
      - "8081:8080"
    environment:
      - PORT=8080
      - FIRESTORE_EMULATOR_HOST=firestore:8089
      - GOOGLE_CLOUD_PROJECT=sre-demo-project
    depends_on:
      - firestore

  # Frontend Nginx
  frontend:
    build: ./frontend
    platform: linux/arm64
    ports:
      - "8082:8080"
    environment:
      - BACKEND_URL=http://backend:8080
    depends_on:
      - backend

networks:
  default:
    name: sre-demo-network
